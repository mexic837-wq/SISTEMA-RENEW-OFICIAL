<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Renew Solar – Portal de Ventas</title>
  <meta name="description" content="Portal interno del equipo de ventas de Renew Solar. Gestiona tus proyectos solares." />

  <!-- Favicon using logo -->
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link rel="apple-touch-icon" href="assets/images/logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div id="app">

  <!-- ══════════════════════════════════════
       SCREEN 1: LOGIN
       ══════════════════════════════════════ -->
  <section class="screen" id="screen-login" aria-label="Login">
    <!-- Rendered by login.js -->
  </section>

  <!-- ══════════════════════════════════════
       SCREEN 1.5: HUB
       ══════════════════════════════════════ -->
  <section class="screen" id="screen-hub" aria-label="Selector de Ecosistema">
    <!-- Rendered by hub.js -->
  </section>

  <!-- ══════════════════════════════════════
       SCREEN 2: DASHBOARD
       ══════════════════════════════════════ -->
  <section class="screen" id="screen-dashboard" aria-label="Dashboard – Mis Proyectos">
    <!-- Rendered by dashboard.js -->
  </section>

  <!-- ══════════════════════════════════════
       SCREEN 3: NEW CLIENT FORM
       ══════════════════════════════════════ -->
  <section class="screen" id="screen-new-client" aria-label="Nuevo Proyecto Solar">
    <!-- Rendered by newClient.js -->
  </section>

  <!-- ══════════════════════════════════════
       SCREEN 4: PROJECT DETAIL
       ══════════════════════════════════════ -->
  <section class="screen" id="screen-detail" aria-label="Detalle del Proyecto">
    <!-- Rendered by projectDetail.js -->
  </section>

  <!-- ══════════════════════════════════════
       BOTTOM NAV BAR (Mobile Global)
       ══════════════════════════════════════ -->
  <nav id="bottom-nav" style="display:none; position:fixed; bottom:0; left:0; width:100%; height:75px; background:var(--surface); border-top:1px solid var(--border); z-index:900; align-items:center; justify-content:space-between; padding:0 24px; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 16px rgba(0,0,0,0.4)">
      
      <!-- Izquierda 1: Inicio -->
      <a href="#dashboard" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; color:var(--primary); transition:0.3s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span style="font-size:0.65rem; font-weight:600">Inicio</span>
      </a>

      <!-- Izquierda 2: Clientes -->
      <a href="#dashboard" onclick="alert('Cartera de Clientes en desarrollo')" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; color:var(--text-muted); transition:0.3s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span style="font-size:0.65rem; font-weight:600">Clientes</span>
      </a>
      
      <!-- Centro: Flotante + -->
      <a href="#new-client" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; color:var(--text-muted); position:relative; top:-15px">
          <div style="width:56px; height:56px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; box-shadow:0 8px 16px rgba(13,148,136,0.3); border:4px solid var(--bg)">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
          <span style="font-size:0.65rem; font-weight:600; margin-top:-2px">Nuevo</span>
      </a>

      <!-- Derecha 1: Chat -->
      <a href="#dashboard" onclick="alert('Módulo de Chat en desarrollo')" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; color:var(--text-muted); transition:0.3s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span style="font-size:0.65rem; font-weight:600">Chat</span>
      </a>

      <!-- Derecha 2: Menú -->
      <a href="#" id="btn-open-drawer" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; color:var(--text-muted); transition:0.3s">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          <span style="font-size:0.65rem; font-weight:600">Menú</span>
      </a>
  </nav>

</div><!-- /#app -->

<!-- MOBILE DRAWER / LATERAL MENU -->
<div id="drawer-overlay" class="drawer-overlay-hidden"></div>
<div id="mobile-drawer" class="drawer-hidden">
  <div class="drawer-header" style="padding: 24px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <img src="assets/images/logo.png" alt="Renew Solar" style="height: 32px; object-fit: contain;">
    <button id="btn-close-drawer" style="background:none; border:none; padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" class="btn-ghost">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  
  <div class="drawer-content" style="padding: 24px; overflow-y:auto; height:calc(100% - 180px);">
    
    <p style="font-size:0.75rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Herramientas</p>
    <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:32px;">
      <button class="btn btn-ghost" style="justify-content:flex-start; font-weight:600; color:var(--text-primary); padding:14px; background:var(--surface-alt); border-radius:12px" onclick="alert('Generador PDF próximamente')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:12px; color:var(--primary)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Generador de Contratos
      </button>
      <button class="btn btn-ghost" style="justify-content:flex-start; font-weight:600; color:var(--text-primary); padding:14px; background:var(--surface-alt); border-radius:12px" onclick="alert('Inventario próximamente')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:12px; color:var(--info)"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        Inventario Real
      </button>
      <div id="drawer-dynamic-items" style="display:flex; flex-direction:column; gap:12px;"></div>
    </div>

    <p style="font-size:0.75rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Configuración</p>
    <div style="display:flex; flex-direction:column; gap:4px;">
      <button class="btn btn-ghost" style="justify-content:flex-start; color:var(--text-secondary); padding:12px 14px;">Mi Cuenta</button>
      <button class="btn btn-ghost" style="justify-content:flex-start; color:var(--text-secondary); padding:12px 14px;">Notificaciones</button>
      <button class="btn btn-ghost" style="justify-content:flex-start; color:var(--text-secondary); padding:12px 14px;">Soporte Técnico</button>
    </div>

  </div>

  <div class="drawer-footer" style="position:absolute; bottom:0; left:0; width:100%; padding:24px; border-top:1px solid var(--border); background:var(--surface);">
    <button class="btn btn-ghost" id="drawer-logout-btn" style="color:var(--danger); width:100%; justify-content:center; font-weight:bold; background:rgba(239, 68, 68, 0.1); border-radius:12px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:8px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar Sesión
    </button>
  </div>
</div>

<!-- SPA Entry (ES Modules) -->
<script type="module" src="js/app.js"></script>

</body>
</html>
